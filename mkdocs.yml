      - "Higher-Order Config": "patterns/higher-order-config.md"
      - "Dynamic Skeleton": "patterns/dynamic-skeleton.md"
      - "Config Templates": "patterns/config-templates.md"
      - "Sweep Generation": "patterns/sweep-generation.md"
