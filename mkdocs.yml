      - "Config Layering": "guides/config-layering.md"
      - "CLI Patterns": "guides/cli-patterns.md"
      - "YAML Functions": "guides/yaml-functions.md"
      - "Deferred Execution": "guides/deferred-execution.md"
      - "Secrets and Environment": "guides/secrets-and-env.md"
      - "Debugging": "guides/debugging.md"
      - "Serialization": "guides/serialization.md"
      - "Extending Dracon": "guides/extending-dracon.md"
      - "Migration from Hydra": "guides/migration-from-hydra.md"
      - "Dracon and Broodmon": "guides/dracon-and-broodmon.md"
  - "Concepts":
