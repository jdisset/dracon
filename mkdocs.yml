site_name: Dracon
site_description: A modular configuration system and CLI generator for Python
repo_url: https://github.com/jdisset/dracon
repo_name: jdisset/dracon

theme:
  name: material
  logo: dracon_logo.svg
  favicon: dracon_logo.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes # Enable section index pages
    - search.highlight
    - search.share
    - search.suggest
    - content.tabs.link
    - content.code.annotate
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: "." # Allow including files like examples
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  # Extensions for better navigation and structure
  - toc:
      permalink: true

plugins:
  - search
  - section-index
  - include-markdown
  - print-site

nav:
  - "Home": "index.md"
  - "Start Here":
      - "Quickstart": "quickstart.md"
      - "Your First Config": "tutorials/01-first-config.md"
      - "Build a CLI": "tutorials/02-build-a-cli.md"
      - "Compose Configs": "tutorials/03-compose-configs.md"
      - "Dynamic Configs": "tutorials/04-dynamic-configs.md"
      - "Late Binding": "tutorials/05-late-binding.md"
  - "How-To Guides":
